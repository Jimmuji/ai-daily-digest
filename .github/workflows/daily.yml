name: AI Daily Digest

on:
  schedule:
    # Run at 08:00 Beijing time (00:00 UTC) every day
    - cron: '0 0 * * *'
    # Backup: retry at 09:00 Beijing time in case the first run missed
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: cd scripts && python main.py

      - name: Commit and push
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@github.com"
          git add daily/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "📰 Daily digest for ${DATE}"
            git push
          fi
